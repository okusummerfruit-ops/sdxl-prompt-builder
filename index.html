function sysPrompt(){return `あなたはSDXL画像生成用プロンプト変換アシスタントです。

ユーザーの日本語入力を、自然な英訳ではなく、SDXL画像生成で使いやすいDanbooru風タグへ変換してください。

出力は必ずJSONのみ。Markdown、説明文、コードブロックは禁止。

最重要方針：

- DB一致率より、ユーザーが明示した要素を漏らさないことを優先する。
- 自然な英訳を目的にしない。
- ただし、ユーザーが明示した具体要素は勝手に削除・圧縮・置換しない。
- 抽象語・感情語・雰囲気語だけを、画像上に見える視覚要素へ分解する。
- Danbooruタグとして存在しそうな短いタグを優先する。
- 説明的な英語フレーズはなるべく避けるが、そのためにユーザー指定要素を削除してはいけない。
- primaryには、最もDanbooruタグらしい候補を入れる。
- alternativesには、Danbooruタグとして存在しそうな表記違い・近い視覚タグ・分解候補を4件入れる。
- primaryとalternativesは重複禁止。
- alternativesは必ず4件。

【入力要素の保持ルール】

ユーザー入力の各行、または各意味単位につき、最低1つ以上のタグ要素を出力する。

例：

後ろ姿
スーツ
威圧的

この場合、以下の3系統を必ずすべて出力する。

- 後ろ姿に対応するタグ
- スーツに対応するタグ
- 威圧的に対応するタグ

スーツを jacket だけに圧縮してはいけない。
威圧的だけを出して、後ろ姿やスーツを省略してはいけない。

【保持対象】

以下はユーザーが明示的に指定した内容として扱い、意味変換せずDanbooruタグ候補として保持する。

- 構図
- カメラアングル
- 顔の向き
- 体の向き
- ポーズ
- 衣装
- 髪型
- 装飾品
- 小物
- 背景
- 場所
- 時間帯
- 人数
- キャラクター属性

これらは抽象化・再解釈しない。
推論対象より優先する。
最終出力から省略してはいけない。

例：

横顔 → profile, side_view, side_profile

後ろ姿 → from_behind, back, looking_back

バストアップ → upper_body, bust, portrait

煽り → low_angle, from_below

俯瞰 → from_above

黒シャツ → black_shirt

スーツ → suit, formal_clothes, dress_shirt, necktie

ピアス → earrings, ear_piercing

長髪 → long_hair

公園 → park

【推論対象】

以下だけを、画像上で観測できる視覚要素へ分解する。

- 感情
- 雰囲気
- 印象
- 抽象的形容詞
- 心理状態

例：

物憂げ
→ half-closed_eyes, looking_away, sad, expressionless

疲れた
→ tired, sleepy, bags_under_eyes, half-closed_eyes

妖艶
→ seductive_smile, half-closed_eyes, looking_at_viewer, parted_lips

威圧的
→ narrowed_eyes, looking_down, smirk, serious

神秘的
→ shadow, glowing, mysterious, dramatic_lighting

優雅
→ elegant, graceful, refined

【説明的タグの扱い】

説明的な英語フレーズは、可能なら一般的なDanbooruタグへ寄せる。

ただし、説明的タグを避けるために、ユーザー指定要素そのものを削除してはいけない。

例：

business_suit → suit

formal_wear → formal_clothes または suit

back_view → from_behind

tie → necktie

profile_gaze → profile または looking_to_the_side

profile_pose → profile

hair_tucked_behind_ear → hair_behind_ear

melancholic_expression → half-closed_eyes, looking_away, expressionless

melancholic_atmosphere → shadow, looking_away, half-closed_eyes

【保持対象の必須出力例】

横顔
→ profile を必ず出力する。
looking_away のみで代替してはいけない。

横顔 + 物憂げ
→ profile と looking_away の両方を出力する。

後ろ姿
→ from_behind を必ず出力する。
back_view のみは避ける。

後ろ姿 + 威圧的
→ from_behind と narrowed_eyes / looking_down / serious の両方を出力する。

バストアップ

黒シャツ
→ black_shirt を必ず出力する。

スーツ
→ suit を必ず出力する。
jacket のみで代替してはいけない。

ピアス
→ earrings を必ず出力する。

長髪
→ long_hair を必ず出力する。

【出力前チェック】

最終出力前に以下を確認する。

1. ユーザー入力の各行・各意味単位を一覧化する
2. 保持対象と推論対象に分類する
3. 保持対象が最終出力にすべて含まれているか確認する
4. 欠けている保持対象があれば追加する
5. 推論タグのみで保持対象を代替していないか確認する
6. 説明的な英語フレーズがある場合は、可能な範囲で一般的なDanbooruタグへ置換する
7. ただし、置換によってユーザー指定要素を削除してはいけない

カテゴリ：

- expression: 表情
- gaze: 視線
- clothing: 衣装

- composition: 構図・カメラ・画角
- negative: 場面特有のネガティブプロンプト

各要素は必ずこの形式：

{"meaning_ja":"日本語での意味","primary":"Danbooru風タグ候補","alternatives":["候補1","候補2","候補3","候補4"],"translation_ja":"primaryの日本語直訳"}

- 長髪 → long_hair, very_long_hair, hair

補完ルール：

- ユーザーが明示した内容を最優先する。
- 高確率で付随する視覚要素のみ補完してよい。
- 明示されていない衣装、場所、構図、キャラクター設定を勝手に追加しない。
- 「白シャツ」から office を追加しない。
- 「コーヒー」から cafe を追加しない。
- 「スーツ」から meeting_room を追加しない。

固定タグ：

- 固定タグに含まれる内容や近い意味のタグはなるべく出力しない。

negative：

- 必要な場合のみ生成する。
- 品質系・性別維持・キャラ維持・LoRA維持のネガティブは生成しない。
- 場面特有の構図崩れ、視線崩れ、ポーズ崩れ、衣装崩れのみ生成する。

async function fetchGeminiOnce(){const key=els.gkey.value.trim();if(!key)throw new Error('Gemini API Keyが未入力です。API設定を開いて入力してください。');const body={contents:[{role:'user',parts:[{text:sysPrompt()+"\n\n"+modelInstruction()+"\n\n"+userMessage()}]}],generationConfig:{temperature:0.35,responseMimeType:'application/json'}};const url=`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(key)}`;const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const text=await res.text();if(!res.ok){const err=new Error(`Gemini APIエラー: HTTP ${res.status}\n${text.slice(0,800)}`);err.status=res.status;throw err}let data;try{data=JSON.parse(text)}catch(e){throw new Error('Gemini応答をJSONとして読めませんでした: '+text.slice(0,500))}return data}
async function callGeminiWithRetry(){let last;for(let attempt=1;attempt<=3;attempt++){try{if(attempt>1)setStatus(`Geminiが混雑しています。再試行 ${attempt}/3 ...`);const data=await fetchGeminiOnce();const aiText=extractTextFromGemini(data);if(!aiText)throw new Error('Geminiからテキストが返りませんでした。');let parsed;try{parsed=JSON.parse(cleanJsonText(aiText))}catch(e){parsed=fallbackJsonFromText(aiText)}return {parsed,raw:data,aiText}}catch(e){last=e;if(e.status===503||e.status===429){await sleep(attempt*3000);continue}throw e}}throw last}
async function fetchOpenAIOnce(){const key=els.okey.value.trim();if(!key)throw new Error('OpenAI API Keyが未入力です。API設定を開いて入力してください。');const body={model:OPENAI_MODEL,response_format:{type:'json_object'},messages:[{role:'system',content:sysPrompt()+'\n\n'+modelInstruction()},{role:'user',content:userMessage()}],temperature:0.35,store:false};const res=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify(body)});const text=await res.text();if(!res.ok){const err=new Error(`OpenAI APIエラー: HTTP ${res.status}\n${text.slice(0,800)}`);err.status=res.status;throw err}let data;try{data=JSON.parse(text)}catch(e){throw new Error('OpenAI応答をJSONとして読めませんでした: '+text.slice(0,500))}return data}
async function callOpenAIWithRetry(){let last;for(let attempt=1;attempt<=3;attempt++){try{if(attempt>1)setStatus(`OpenAIが混雑しています。再試行 ${attempt}/3 ...`);const data=await fetchOpenAIOnce();const aiText=extractTextFromOpenAI(data);if(!aiText)throw new Error('OpenAIからテキストが返りませんでした。');let parsed;try{parsed=JSON.parse(cleanJsonText(aiText))}catch(e){parsed=fallbackJsonFromText(aiText)}return {parsed,raw:data,aiText}}catch(e){last=e;if(e.status===429||e.status===500||e.status===502||e.status===503){await sleep(attempt*3000);continue}throw e}}throw last}
function correctionCandidates(s){const out=[];const list=correctionMap.get(normalize(s));if(list){for(const v of list){out.push(v)}}return out}
function candidateStrings(item){const base=(typeof item==='string')?[item]:[item?.primary||'',...(Array.isArray(item?.alternatives)?item.alternatives:[])].filter(Boolean);const out=[];const seen=new Set();for(const c of base){for(const v of correctionCandidates(c)){const n=normalize(v);if(n&&!seen.has(n)){seen.add(n);out.push(v)}}const n=normalize(c);if(n&&!seen.has(n)){seen.add(n);out.push(c)}}return out}
function matchItem(item){const primary=(typeof item==='string')?item:(item?.primary||'');const translation=(typeof item==='string')?item:(item?.translation_ja||item?.meaning_ja||item?.primary||'');const candidates=candidateStrings(item);let matches=[];for(const c of candidates){const n=normalize(c);const list=tagMap.get(n)||[];matches.push(...list.map(row=>({...row,matched_candidate:c})))}if(matches.length){matches.sort((a,b)=>(b.post_count||0)-(a.post_count||0));const best=matches[0];return {tag:best.tag,translation,matched:true,source:primary,post_count:best.post_count||0,candidates,corrected_from:best.matched_candidate!==primary?primary:''}}return {tag:primary,translation,matched:false,source:primary,post_count:0,candidates}}
function collect(json){const fixed=fixedSet();const positive=[];const negative=[];const byCat={};for(const f of fields){const list=Array.isArray(json?.[f])?json[f]:[];byCat[f]=[];for(const item of list){const o=matchItem(item);if(!o.tag)continue;if(fixed.has(normalize(o.tag))||fixed.has(normalize(o.source)))continue;byCat[f].push(o);if(f==='negative')negative.push(o);else positive.push(o)}}return {positive:dedupe(positive),negative:dedupe(negative),byCat:Object.fromEntries(Object.entries(byCat).map(([k,v])=>[k,dedupe(v)]))}}
function dedupe(list){const seen=new Set();const out=[];for(const x of list){const n=normalize(x.tag);if(!n||seen.has(n))continue;seen.add(n);out.push(x)}return out} function joinTags(list){return list.map(x=>x.tag).join(', ')} function renderPreview(list){return list.map(x=>`<span class="${x.matched?'matched':'unmatched'}">${esc(x.tag)}</span>`).join(', ')} function renderTrans(list){return list.map(x=>`<span class="${x.matched?'matched':'unmatched'}">${esc(x.translation)}</span>`).join(' / ')}
function block(title,list,id){return `<div class="output-block"><div class="output-title"><h3>${title}</h3><button class="copy-btn" type="button" data-copy="${id}">コピー</button></div><div class="tag-preview">${renderPreview(list)||'<span class="muted">なし</span>'}</div><textarea id="${id}" class="textarea output">${esc(joinTags(list))}</textarea><label class="label">日本語確認</label><div class="translation">${renderTrans(list)||'<span class="muted">なし</span>'}</div><p class="muted">黒字: DB一致 / 赤字: DB未一致</p></div>`}
function render(json){const c=collect(json);if(els.mode.value==='five_category'){const map=[['表情',[...c.byCat.expression,...c.byCat.gaze]],['衣装',c.byCat.clothing],['背景',c.byCat.background],['状態',[...c.byCat.pose,...c.byCat.object]],['ネガティブ',c.byCat.negative]];els.out.innerHTML=map.map((m,i)=>block(m[0],m[1],`out_${i}`)).join('')}else{els.out.innerHTML=block('Positive',c.positive,'out_pos')+block('Negative',c.negative,'out_neg')}document.querySelectorAll('[data-copy]').forEach(btn=>btn.addEventListener('click',()=>{const id=btn.getAttribute('data-copy');const v=$(id)?.value||'';navigator.clipboard?.writeText(v).then(()=>setStatus('コピーしました。','ok')).catch(()=>setStatus('コピーできませんでした。テキストを選択してコピーしてください。','err'))}));addHistory(c)}
function addHistory(c){let hist=[];try{hist=JSON.parse(localStorage.getItem(STORAGE+'history')||'[]')}catch(e){}hist.unshift({date:new Date().toLocaleString(),input:els.input.value,positive:joinTags(c.positive),negative:joinTags(c.negative),mode:els.mode.value});hist=hist.slice(0,50);localStorage.setItem(STORAGE+'history',JSON.stringify(hist));renderHistory()}
function renderHistory(){let hist=[];try{hist=JSON.parse(localStorage.getItem(STORAGE+'history')||'[]')}catch(e){}if(!hist.length){els.hist.innerHTML='<p class="muted">履歴はまだありません。</p>';return}els.hist.innerHTML=hist.map((h,i)=>`<div class="history-item"><strong>${esc(h.date)}</strong> <span class="pill">${esc(h.mode||'')}</span><br><span class="muted">${esc((h.input||'').slice(0,60))}</span><br><small>Positive: ${esc((h.positive||'').slice(0,90))}</small><br><button class="sub-btn" type="button" data-restore="${i}">この内容で再編集</button></div>`).join('');document.querySelectorAll('[data-restore]').forEach(btn=>btn.addEventListener('click',()=>{const h=hist[Number(btn.dataset.restore)];if(!h)return;els.input.value=h.input||'';els.mode.value=h.mode||'positive_negative';save();window.scrollTo({top:0,behavior:'smooth'});setStatus('履歴の入力文を復元しました。','ok')}))}
async function onGenerate(){setStatus('生成ボタンが押されました。入力とAPIキーを確認しています...');els.raw.textContent='';save();if(!els.input.value.trim()){setStatus('日本語入力が空です。','err');return}els.btn.disabled=true;els.btn.textContent='生成中...';try{const provider=els.provider?.value||'gemini';setStatus(provider==='openai'?'OpenAI APIへ問い合わせています...':'Gemini APIへ問い合わせています...');const result=provider==='openai'?await callOpenAIWithRetry():await callGeminiWithRetry();els.raw.textContent='[Provider]\n'+provider+'\n\n[AI text]\n'+result.aiText+'\n\n[Parsed]\n'+JSON.stringify(result.parsed,null,2)+'\n\n[Raw]\n'+JSON.stringify(result.raw,null,2);render(result.parsed);setStatus('生成しました。候補5件照合済みです。','ok')}catch(e){console.error(e);els.raw.textContent=String(e&&e.stack?e.stack:e);setStatus(String(e.message||e),'err')}finally{els.btn.disabled=false;els.btn.textContent='生成'}}
async function init(){load();await loadDb();renderHistory();['input','change'].forEach(ev=>{[els.input,els.model,els.mode,els.fp,els.fn,els.provider,els.gkey,els.okey].forEach(el=>el.addEventListener(ev,save))});els.btn.addEventListener('click',onGenerate);setStatus('準備完了。API設定でGemini / OpenAIを選んで生成できます。','ok')}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
